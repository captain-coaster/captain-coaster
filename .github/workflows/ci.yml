name: 'CI'

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'
                  extensions: redis, xsl

            - name: Lint Composer config
              run: composer validate --strict

            - uses: php-actions/composer@v6
              id: install
              with:
                  php_version: '8.5'
                  php_extensions: redis xsl
                  memory_limit: 256M

            - name: Run PHPUnit tests
              run: vendor/bin/phpunit

            - uses: php-actions/phpstan@v3
              with:
                  php_version: '8.5'

            - name: PHP-CS-Fixer
              # php-cs-fixer v3.95.1
              uses: docker://oskarstark/php-cs-fixer-ga@sha256:2b9424218def75c73ce4f9e88a79099609d2479e4fa38bb969047c047eab4327
              with:
                  args: --diff --dry-run

            - name: Lint Twig templates
              run: ./bin/console lint:twig templates --env=prod

            - name: Lint Parameters and Services
              run: ./bin/console lint:container --no-debug

            - name: Lint Doctrine entities
              run: ./bin/console doctrine:schema:validate --skip-sync -vvv --no-interaction

            - name: Check if any dependencies are compromised
              run: composer audit --abandoned=ignore
